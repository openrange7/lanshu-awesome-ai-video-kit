# 11 模型版本监控端点
# 每周 GitHub Action 抓取这些 URL,对比内容 hash,变化时自动提 issue 提醒维护者人工 review

models:
  seedance-2.0:
    vendor: 字节 火山方舟
    current_version: "2.0"
    endpoints:
      - https://www.volcengine.com/product/ark
      - https://www.volcengine.com/

  happyhorse-1.0:
    vendor: 阿里巴巴
    current_version: "1.0"
    endpoints:
      - https://tryhappyhorseai.com/

  kling-3.0:
    vendor: 快手 · 可灵
    current_version: "3.0"
    endpoints:
      - https://klingai.com/
      - https://klingai.com/document-api

  sora-2:
    vendor: OpenAI
    current_version: "2"
    current_status: "⚠️ Possibly EOL by 2026 Q3 — monitor migration paths"
    endpoints:
