<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading… · video-kit</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

<!-- 全站统一主题(与主页保持一致) -->
<link rel="stylesheet" href="/assets/site-theme.css">

<!-- Markdown 渲染 -->
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/common.min.js"></script>
<style>
  * { box-sizing: border-box; }
  /* viewer 内部别名 — 复用 site-theme 的 tokens */
  :root {
    --fg: var(--text-primary);
    --fg-soft: var(--text-secondary);
    --fg-dim: var(--text-muted);
    --line: var(--glass-border);
    --line-strong: var(--glass-border-strong);
    --card: var(--glass-1);
    --acc-1: var(--accent);
    --acc-2: #f472b6;
  }
  /* ============= 防御性兜底 ============= */
  /* 限制 article 内部任意 SVG / img / iframe 不能撑爆布局 */
  article svg, article img, article iframe, article video, article object, article embed {
    max-width: 100%;
    max-height: 600px;
    width: auto;
    height: auto;
    object-fit: contain;
  }
  /* 确保 nav 里 svg 维持小尺寸,不被外部 CSS 干扰 */
  nav.top svg { max-width: 18px !important; max-height: 18px !important; }
  /* article 不允许 background-image,防止 CSS 污染 */
  article, article * { background-image: none; }
  /* 例外:代码高亮和表格自身的 background-color 不影响 */
  article pre, article code, article table, article th, article tr { background-image: none; }
  .wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 120px 24px 0; }

  /* breadcrumb 显示在 nav 下 */
  .crumb-row {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto; padding: 12px 24px 0;
    color: var(--fg-dim); font-size: 13px;
  }
  .crumb-row a { color: var(--fg-dim); text-decoration: none; transition: color .15s; }
  .crumb-row a:hover { color: var(--acc-1); }
  .crumb-row b { color: var(--fg); }

  /* Loading / Error 状态 */
  .state { padding: 80px 24px; text-align: center; color: var(--fg-dim); }
  .spinner {
    width: 36px; height: 36px; margin: 0 auto 20px;
    border: 3px solid var(--line); border-top-color: var(--acc-1);
    border-radius: 50%; animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Prose */
  article { padding: 12px 0 80px; font-size: 16px; line-height: 1.78; color: var(--fg-soft); }
  article > *:first-child { margin-top: 0; }
  article h1, article h2, article h3, article h4, article h5, article h6 {
    color: var(--fg); font-weight: 700; line-height: 1.3;
    margin: 1.8em 0 .8em; letter-spacing: -0.01em; scroll-margin-top: 80px;
  }
  article h1 {
    font-size: clamp(28px, 4vw, 38px); font-weight: 800;
    margin-top: 0; padding-bottom: 18px;
    border-bottom: 1px solid var(--line-strong);
    background: linear-gradient(135deg, var(--acc-1), var(--acc-2));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  article h2 {
    font-size: 24px; padding-top: 8px;
    border-top: 1px solid var(--line); padding-bottom: 4px; margin-top: 2.4em;
  }
  article h3 { font-size: 19px; color: var(--acc-1); }
  article h4 { font-size: 16px; color: var(--fg); }
  article p { margin: .9em 0; }
  article a {
    color: var(--acc-1); text-decoration: none;
    border-bottom: 1px dashed rgba(167,139,250,0.4); transition: all .15s;
  }
  article a:hover { color: var(--acc-2); border-bottom-style: solid; border-bottom-color: var(--acc-2); }
  article strong, article b { color: var(--fg); font-weight: 700; }
  article em, article i { color: var(--fg); font-style: italic; }
  article ul, article ol { margin: .9em 0 .9em 1.2em; }
  article li { margin: .4em 0; }
  article li > p { margin: .3em 0; }
  article ul ul, article ol ol, article ul ol, article ol ul { margin: .3em 0 .3em 1.2em; }
  article blockquote {
    margin: 1.2em 0; padding: 14px 20px;
    border-left: 3px solid var(--acc-1);
    background: var(--accent-soft);
    border-radius: 4px 10px 10px 4px;
    color: var(--fg-soft);
  }
  article blockquote p:first-child { margin-top: 0; }
  article blockquote p:last-child { margin-bottom: 0; }
  article hr { border: none; height: 1px; background: var(--line-strong); margin: 2.4em 0; }
  article :not(pre) > code {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.88em; padding: 2px 7px; border-radius: 5px;
    background: var(--accent-soft); color: var(--fg);
    border: 1px solid var(--glass-border);
  }
  /* 代码块固定 github-dark 配色,与 hljs 主题对齐,不受 article 主题继承影响 */
  article pre {
    margin: 1.2em 0;
    background: #0d1117 !important;          /* github-dark 同款深色 */
    color: #c9d1d9 !important;               /* github-dark 同款浅色字 */
    border: 1px solid var(--line);
    border-radius: 12px; padding: 18px 22px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13.5px; line-height: 1.7;
  }
  article pre code {
    padding: 0 !important; background: transparent !important;
    border: none !important;
    color: #c9d1d9 !important;               /* 强制浅色,覆盖 article 继承 */
    font-size: inherit;
  }
  /* hljs 高亮时,各 token 颜色由 hljs/github-dark.css 接管(优先级更高的具体 class)*/
  article pre code.hljs { color: #c9d1d9 !important; background: transparent !important; }
  article table {
    width: 100%; margin: 1.4em 0; border-collapse: collapse;
    font-size: 14px; background: var(--card);
    border: 1px solid var(--line); border-radius: 10px; overflow: hidden;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  article thead { background: var(--accent-soft); }
  article th {
    text-align: left; padding: 12px 14px; font-weight: 700; color: var(--fg);
    border-bottom: 1px solid var(--line-strong);
  }
  article td { padding: 11px 14px; border-top: 1px solid var(--line); color: var(--fg-soft); vertical-align: top; }
  article tbody tr:hover { background: var(--glass-1); }
  article img { max-width: 100%; height: auto; border-radius: 10px; margin: 1em 0; }

  /* TOC */
  .toc-wrap {
    position: fixed;
    left: calc(50% + 470px); top: 96px;
    width: 220px; padding: 14px 16px;
    background: var(--card); backdrop-filter: blur(20px);
    border: 1px solid var(--line); border-radius: 12px;
    max-height: calc(100vh - 120px); overflow-y: auto;
    font-size: 12.5px; display: none;
  }
  @media (min-width: 1440px) { .toc-wrap { display: block; } }
  .toc-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--fg-dim); margin-bottom: 10px; }
  .toc-list { list-style: none; margin: 0; padding: 0; }
  .toc-list li { margin: 4px 0; }
  .toc-list a {
    color: var(--fg-dim); text-decoration: none;
    display: block; padding: 3px 8px; border-radius: 5px;
    border-left: 2px solid transparent; transition: all .15s;
  }
  .toc-list a:hover { color: var(--fg); background: var(--glass-1); }
  .toc-list .h3 { padding-left: 16px; font-size: 11.5px; }
  .toc-list .h4 { padding-left: 24px; font-size: 11px; }

  /* Footer */
  .foot {
    max-width: 900px; margin: 60px auto 0; padding: 24px 24px 40px;
    border-top: 1px solid var(--line); text-align: center;
    font-size: 13px; color: var(--fg-dim); position: relative; z-index: 1;
  }
  .foot a { color: var(--acc-1); text-decoration: none; }
  .foot a:hover { text-decoration: underline; }
  .foot .raw {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; margin-top: 10px;
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }

  @media (max-width: 720px) {
    .wrap { padding: 100px 18px 0; }
    article { font-size: 15.5px; }
  }
</style>
</head>
<body>

<!-- 全站统一 nav -->
<nav class="top">
  <a class="brand" href="./"><span class="brand-dot"></span><span>lanshu-video-kit</span></a>
  <a class="nav-link" href="./methodology/">📖 Methodology</a>
  <a class="nav-link" href="./prompts/">📚 Prompts</a>
  <a class="nav-link" href="./skills/">🛠️ Skills</a>
  <a class="nav-link" href="./tools/prompt-browser/">🌐 Browser</a>
  <a class="nav-link" href="./tools/cross-model/">🔀 Matrix</a>
  <a class="nav-link cta" href="./">⌂ 主页</a>
  <button class="nav-icon-btn" id="themeToggle" title="切换主题" aria-label="切换主题">
    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</nav>

<div class="crumb-row" id="breadcrumb">/ loading…</div>

<div class="wrap">
  <article id="content">
    <div class="state">
      <div class="spinner"></div>
      <p>正在渲染 Markdown…</p>
    </div>
  </article>
</div>

<div class="foot" id="foot" style="display:none">
  <p>📖 由 video-kit Markdown Viewer 渲染 · 数据源 = 原始 .md 文件</p>
  <a class="raw" id="rawLink" href="" target="_blank">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    查看原始 .md
  </a>
</div>

<aside class="toc-wrap" id="tocWrap" style="display:none">
  <div class="toc-title">📑 目录</div>
  <ul class="toc-list" id="tocList"></ul>
</aside>

<script src="/assets/site-theme.js" defer></script>
<script>
const $ = (sel) => document.querySelector(sel);
const params = new URLSearchParams(location.search);
const file = params.get('file');

function showError(msg) {
  $('#content').innerHTML = `
    <div class="state">
      <p style="color:#fb7185;font-size:18px;font-weight:600;margin-bottom:10px">⚠️ ${msg}</p>
      <p>URL 参数缺失或文件不存在。<br>用法:<code>viewer.html?file=path/to/file.md</code></p>
      <p style="margin-top:24px"><a href="./" style="color:var(--acc-1)">← 返回主页</a></p>
    </div>`;
}

function slugify(text) {
  return text.toLowerCase().trim()
    .replace(/[^\w一-龥\s-]/g, '')
    .replace(/\s+/g, '-');
}

function buildBreadcrumb(filePath) {
  const parts = filePath.split('/');
  const fname = parts[parts.length - 1];
  const dir = parts.slice(0, -1);
  let html = '<a href="./">/</a> ';
  let pathAcc = '';
  for (const d of dir) {
    pathAcc += d + '/';
    html += `<a href="${pathAcc}">${d}</a> / `;
  }
  html += `<b>${fname}</b>`;
  return html;
}

function rewriteLinks(articleEl, fileDir) {
  articleEl.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href');
    if (!href || href.startsWith('http://') || href.startsWith('https://') || href.startsWith('#') || href.startsWith('mailto:')) return;
    let resolvedPath;
    try {
      const base = new URL(fileDir + '/', location.origin + '/');
      const resolved = new URL(href, base);
      resolvedPath = resolved.pathname.replace(/^\//, '');
    } catch (e) { return; }
    if (resolvedPath.endsWith('.md')) {
      a.setAttribute('href', `viewer.html?file=${encodeURIComponent(resolvedPath)}`);
    } else {
      a.setAttribute('href', '/' + resolvedPath);
    }
  });
}

function buildTOC(articleEl) {
  const headings = articleEl.querySelectorAll('h2, h3, h4');
  if (headings.length < 3) return;
  const tocList = $('#tocList');
  headings.forEach((h, i) => {
    if (!h.id) h.id = 'h-' + (i+1) + '-' + slugify(h.textContent).slice(0, 30);
    const li = document.createElement('li');
    li.className = h.tagName.toLowerCase();
    li.innerHTML = `<a href="#${h.id}" class="${h.tagName.toLowerCase()}">${h.textContent}</a>`;
    tocList.appendChild(li);
  });
  $('#tocWrap').style.display = 'block';
}

async function main() {
  if (!file) { showError('未指定 file 参数'); return; }
  if (file.includes('..') || file.startsWith('/') || file.startsWith('http')) {
    showError('非法 file 路径'); return;
  }
  $('#breadcrumb').innerHTML = buildBreadcrumb(file);

  try {
    const fetchUrl = file + (file.includes('?') ? '&' : '?') + 'raw=1';
    const res = await fetch(fetchUrl, { cache: 'no-cache', redirect: 'error' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();

    if (md.trim().startsWith('<!DOCTYPE') || md.trim().startsWith('<html')) {
      throw new Error('Fetched HTML instead of Markdown — server redirect not bypassed. Restart with `python3 serve.py`');
    }

    const titleMatch = md.match(/^#\s+(.+?)$/m);
    if (titleMatch) {
      document.title = titleMatch[1].replace(/[#*`]/g, '').trim() + ' · video-kit';
    }

    marked.use({ gfm: true, breaks: false });
    const html = marked.parse(md);
    $('#content').innerHTML = html;

    if (window.hljs) {
      $('#content').querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
    }

    const fileDir = file.includes('/') ? file.substring(0, file.lastIndexOf('/')) : '';
    rewriteLinks($('#content'), fileDir);
    buildTOC($('#content'));

    $('#foot').style.display = 'block';
    $('#rawLink').href = '/' + file;
    $('#rawLink').onclick = (e) => {
      e.preventDefault();
      const blob = new Blob([md], { type: 'text/plain; charset=utf-8' });
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    };

    if (location.hash) {
      setTimeout(() => {
        const el = document.querySelector(location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }
  } catch (err) {
    console.error('[viewer.html] main() failed:', err);
    showError('无法加载文件:' + file + ' (' + err.message + ')');
  }
}

window.addEventListener('error', (e) => {
  console.error('[viewer.html] global error:', e.error);
  if ($('#content').querySelector('.spinner')) {
    showError('JavaScript 异常:' + (e.message || '未知错误') + '。请打开 DevTools Console 查看详情。');
  }
});
window.addEventListener('unhandledrejection', (e) => {
  console.error('[viewer.html] unhandled rejection:', e.reason);
  if ($('#content').querySelector('.spinner')) {
    showError('Promise 异常:' + (e.reason?.message || e.reason || '未知') + '。请打开 DevTools Console 查看详情。');
  }
});

main();
</script>
</body>
</html>
